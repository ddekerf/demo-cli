<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' data:;">
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Vibe Timer</title>
  <style>
    :root {
      --bg: #0f1720;
      --card: #0b1220;
      --muted: #9aa4b2;
      --primary: #10b981;
      --danger: #ef4444;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;
    }
    html,body { height:100%; margin:0; background:var(--bg); color:#e6eef6; font-size:14px; }
    .app { max-width:420px; margin:28px auto; padding:20px; }
    header { display:flex; align-items:center; justify-content:space-between; margin-bottom:18px;}
    h1 { font-size:16px; margin:0; }
    .controls { display:flex; gap:10px; margin-bottom:16px;}
    select { padding:8px 10px; border-radius:8px; border:1px solid rgba(255,255,255,0.06); background:var(--card); color:inherit; }
    button { padding:9px 14px; border-radius:8px; border: none; cursor:pointer; font-weight:600; }
    button.start { background:var(--primary); color:#042017; }
    button.stop { background:var(--danger); color:#fff; }
    .sessions { display:flex; flex-direction:column; gap:10px; }
    .session { background:var(--card); padding:10px 12px; border-radius:8px; display:flex; justify-content:space-between; align-items:center; }
    .meta { color:var(--muted); font-size:12px; }
    .empty { color:var(--muted); text-align:center; padding:20px; }
    footer { margin-top:18px; color:var(--muted); font-size:12px; text-align:center }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <h1>Vibe Timer</h1>
      <div id="status" class="meta">Ready</div>
    </header>

    <div class="controls">
      <select id="vibeSelect" aria-label="Select vibe">
        <option value="sleepy">😴 Sleepy</option>
        <option value="chill">🙂 Chill</option>
        <option value="focus">🔥 Focus</option>
      </select>
      <button id="startStopBtn" class="start">Start</button>
    </div>

    <section>
      <div id="sessions" class="sessions"></div>
      <div id="empty" class="empty">No sessions yet.</div>
    </section>

    <footer>Local-only • No accounts</footer>
  </div>

  <script src="./renderer.js"></script>
</body>
</html>
